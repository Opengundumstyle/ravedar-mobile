services:
  postgres:
    image: postgres:18.3
    container_name: ravedar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ravedar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
